<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz — Learn with Ms. Thúy</title>
  <link rel="stylesheet" href="css/style.css" />
  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    if (window.pdfjsLib) {
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }
  </script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body class="light">

  <!-- NAV -->
  <header class="navbar glass" id="navbar">
    <div class="nav-inner">
      <a href="index.html" class="brand">
        <span class="brand-logo">📚</span>
        <span class="brand-text">Learn with Ms. <span class="accent">Thúy</span></span>
      </a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="index.html#articles">Articles</a>
        <a href="index.html#quizzes">Practice Tests</a>
      </nav>
      <div class="nav-actions">
        <button class="icon-btn" id="themeToggle" title="Toggle theme">🌙</button>
      </div>
    </div>
  </header>

  <!-- TOOLBAR -->
  <div class="quiz-toolbar glass" id="quizToolbar">
    <div class="toolbar-left">
      <a href="index.html" class="back-link">← Exit</a>
      <h3 id="quizTitle">Quiz</h3>
    </div>
    <div class="toolbar-center">
      <button class="icon-btn" id="zoomOut" title="Zoom out">➖</button>
      <span id="zoomLevel">100%</span>
      <button class="icon-btn" id="zoomIn" title="Zoom in">➕</button>
      <span class="divider"></span>
      <button class="icon-btn" id="prevPage">◀</button>
      <span id="pageInfo">1 / 1</span>
      <button class="icon-btn" id="nextPage">▶</button>
      <span class="divider"></span>
      <button class="icon-btn" id="fullscreen" title="Fullscreen">⛶</button>
    </div>
    <div class="toolbar-right">
      <div class="mode-switch glass">
        <button class="mode-btn active" data-mode="practice">Practice</button>
        <button class="mode-btn" data-mode="exam">Exam</button>
      </div>
      <div class="timer glass" id="timer">⏱ 00:00</div>
    </div>
  </div>

 <!-- QUIZ LAYOUT -->
<main class="quiz-layout" id="quizLayout">
  <section class="pdf-pane" id="pdfPane">
    <div class="pdf-container" id="pdfContainer">
      <canvas id="pdfCanvas"></canvas>
    </div>
  </section>

  <!-- 👇 RESIZABLE DIVIDER -->
  <div class="divider" id="divider" title="Kéo để thay đổi kích thước • Nhấp đúp để reset">
    <div class="divider-handle">
      <span></span><span></span>
    </div>
  </div>

  <aside class="answer-pane glass" id="answerPane">
    <div class="answer-header">
      <h3>Answer Sheet</h3>
      <span id="answerProgress">0 / 0</span>
    </div>
    <div class="answer-list" id="answerList"></div>
    <div class="answer-footer">
      <button class="btn btn-ghost" id="clearBtn">Clear All</button>
      <button class="btn btn-primary" id="submitBtn">Submit</button>
    </div>
  </aside>
</main>

  <!-- RESULTS MODAL -->
  <div class="modal" id="resultModal">
    <div class="modal-content glass">
      <button class="modal-close" id="modalClose">✕</button>
      <h2>🎉 Quiz Results</h2>
      <div class="result-summary">
        <div class="result-score">
          <div class="score-circle" id="scoreCircle">
            <strong id="scorePercent">0%</strong>
            <small>Score</small>
          </div>
        </div>
        <div class="result-stats">
          <div class="stat-row"><span>Correct:</span><strong id="correctCount">0</strong></div>
          <div class="stat-row"><span>Incorrect:</span><strong id="incorrectCount">0</strong></div>
          <div class="stat-row"><span>Unanswered:</span><strong id="unansweredCount">0</strong></div>
          <div class="stat-row"><span>10-point scale:</span><strong id="tenScale">0</strong></div>
          <div class="stat-row"><span>Time:</span><strong id="timeTaken">00:00</strong></div>
        </div>
      </div>
      <div class="chart-wrap">
        <canvas id="resultChart" width="260" height="260"></canvas>
      </div>

      <div class="wrong-table-wrap">
        <h3>❌ Wrong Answers</h3>
        <table class="wrong-table" id="wrongTable">
          <thead><tr><th>#</th><th>Your Answer</th><th>Correct</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="result-actions">
        <button class="btn btn-ghost" id="reviewBtn">📖 Review</button>
        <button class="btn btn-primary" id="retryBtn">🔁 Retry</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/quiz.js"></script>
</body>
</html>
